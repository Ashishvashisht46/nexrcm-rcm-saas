version: '3.8'

services:
  # ── PostgreSQL Database ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexrcm-db
    environment:
      POSTGRES_DB: nexrcm
      POSTGRES_USER: nexrcm
      POSTGRES_PASSWORD: nexrcm_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexrcm"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (Job Queues & Cache) ───────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexrcm-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── NexRCM API Server ────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexrcm-api
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://nexrcm:nexrcm_password@postgres:5432/nexrcm?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: nexrcm-dev-secret-change-in-production-2024
      JWT_REFRESH_SECRET: nexrcm-refresh-secret-change-in-production-2024
      CORS_ORIGIN: http://localhost:3000,http://localhost:5173,http://localhost:8080
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-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}
      AI_MODEL: ${AI_MODEL:-deepseek/deepseek-chat-v3-0324}
      APP_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    command: >
      sh -c "npx prisma migrate dev --name init &&
             npx prisma generate &&
             node prisma/seed.js &&
             npm run dev"

  # ── Automation Worker ────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexrcm-worker
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://nexrcm:nexrcm_password@postgres:5432/nexrcm?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-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}
      AI_MODEL: ${AI_MODEL:-deepseek/deepseek-chat-v3-0324}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: npm run worker

  # ── Frontend (Static HTML serving) ───────────────────────
  frontend:
    image: nginx:alpine
    container_name: nexrcm-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend/public:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
